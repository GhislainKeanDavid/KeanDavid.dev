services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio.entrypoints=web,websecure
      - "traefik.http.routers.portfolio.rule=Host(`keandavid.cloud`) || Host(`www.keandavid.cloud`)"
      - traefik.http.routers.portfolio.tls=true
      - traefik.http.routers.portfolio.tls.certresolver=mytlschallenge
      - traefik.http.services.portfolio.loadbalancer.server.port=80

networks:
  n8n_default:
    external: true
